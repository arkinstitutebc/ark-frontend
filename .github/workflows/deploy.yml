name: Quality

# Lint + typecheck on every push/PR. Deploys are now handled by Vercel's
# native Git integration (each portal project links directly to this repo and
# deploys on push to main, gated by per-project "Ignored Build Step" so only
# changed apps rebuild). The previous matrix-deploy step was removed because:
#   1. The Vercel free-tier 100/day CLI deploy cap blocked rapid iteration
#   2. Vercel-Git integration uses a separate (more generous) per-hour quota
#   3. PR previews + per-commit deploy logs in the Vercel dashboard come for free

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bunx biome check .
      - run: bun run --filter '*' typecheck
