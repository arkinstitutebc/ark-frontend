name: Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            main: ['apps/main/**', 'packages/**', 'package.json', 'bun.lock']
            training: ['apps/training/**', 'packages/**', 'package.json', 'bun.lock']
            procurement: ['apps/procurement/**', 'packages/**', 'package.json', 'bun.lock']
            inventory: ['apps/inventory/**', 'packages/**', 'package.json', 'bun.lock']
            finance: ['apps/finance/**', 'packages/**', 'package.json', 'bun.lock']
            billing: ['apps/billing/**', 'packages/**', 'package.json', 'bun.lock']
            hr: ['apps/hr/**', 'packages/**', 'package.json', 'bun.lock']

  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bunx biome check .
      - name: Type Check
        run: bun run --filter '*' typecheck

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: [detect, quality]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect.outputs.apps != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect.outputs.apps) }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install Vercel CLI
        run: bun install -g vercel@latest
      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd=apps/${{ matrix.app }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd=apps/${{ matrix.app }}
      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd=apps/${{ matrix.app }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "✓ Deployed ${{ matrix.app }} → $url"
