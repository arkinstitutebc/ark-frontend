name: Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      # Cache bun's global install cache + workspace node_modules. Speeds up
      # the install step from ~30s to a few seconds on hits, which gates
      # downstream lint + typecheck.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bunx biome check .
      - run: bun run --filter '*' typecheck

  deploy:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: pull, path-filter build, restart
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash <<'EOF'
            set -euo pipefail
            cd /opt/ark-portals/repo
            PREV_SHA=$(sudo -u ark git rev-parse HEAD)
            sudo -u ark git pull --ff-only origin main
            NEW_SHA=$(sudo -u ark git rev-parse HEAD)
            PREV_SHA="$PREV_SHA" NEW_SHA="$NEW_SHA" bash infra/deploy.sh
          EOF
      - name: health check (all 7 portals, parallel)
        run: |
          PORTALS="portal training procurement inventory finance billing hr"
          fail=0
          pids=()
          for h in $PORTALS; do
            (
              for i in 1 2 3 4 5; do
                if curl -sfk --max-time 10 "https://$h.arkinstitutebc.com" -o /dev/null; then
                  echo "OK $h.arkinstitutebc.com healthy on attempt $i"
                  exit 0
                fi
                echo "[$h] attempt $i failed"
                # sleep only between attempts, not after the last one
                if [ "$i" -lt 5 ]; then sleep 3; fi
              done
              echo "FAIL $h.arkinstitutebc.com — check 'ssh ark-api journalctl -u ark-portal-$h -n 50'"
              exit 1
            ) &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do
            if ! wait "$pid"; then fail=1; fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "one or more portals failed health check"
            exit 1
          fi
