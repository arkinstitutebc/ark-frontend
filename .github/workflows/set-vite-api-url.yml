name: Set VITE_API_URL on all 7 Vercel projects

# One-off workflow. Trigger via `gh workflow run` or the Actions tab.
# Bypasses the broken `vercel env add` (saves empty values from stdin in CI)
# by writing directly to the per-project .vercel/.env.production.local file
# AFTER `vercel pull` and BEFORE `vercel build`.
#
# This patches the in-build env only — the persistent Vercel project env still
# needs to be set in the dashboard for FUTURE deploys via the regular CI flow.
# Delete this file once the dashboard env is set up properly.

on:
  workflow_dispatch:

jobs:
  set-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [main, training, procurement, inventory, finance, billing, hr]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install -g vercel@latest

      - name: Pull project link
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd=apps/${{ matrix.app }}

      - name: Inject VITE_API_URL into pulled .env (overwrite empty value)
        run: |
          ENV_FILE=apps/${{ matrix.app }}/.vercel/.env.production.local
          # Remove any existing VITE_API_URL line (might be empty), then append the right value.
          if [ -f "$ENV_FILE" ]; then
            grep -v '^VITE_API_URL=' "$ENV_FILE" > "$ENV_FILE.tmp" || true
            mv "$ENV_FILE.tmp" "$ENV_FILE"
          fi
          echo 'VITE_API_URL="https://api.arkinstitutebc.com"' >> "$ENV_FILE"
          echo "--- final $ENV_FILE (vite vars) ---"
          grep -i vite "$ENV_FILE" || true

      - name: Build with the injected env
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd=apps/${{ matrix.app }}

      - name: Verify built chunks contain api.arkinstitutebc.com (not localhost)
        run: |
          set -e
          DIST=apps/${{ matrix.app }}/.vercel/output/static/assets
          if grep -rq "localhost:4000" "$DIST" 2>/dev/null; then
            echo "FAIL: built bundle still contains localhost:4000"
            grep -rln "localhost:4000" "$DIST" | head -3
            exit 1
          fi
          echo "OK: no localhost:4000 in built bundle"

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd=apps/${{ matrix.app }}
